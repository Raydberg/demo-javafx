name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build jar and copy runtime deps
        shell: pwsh
        run: mvn -B clean package dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/libs

      - name: Install WiX
        shell: pwsh
        run: |
          winget install --id WiXToolset.WiXCLI --exact --accept-source-agreements --accept-package-agreements

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          $tool = Get-ChildItem "C:\Program Files","C:\Program Files (x86)" -Include wix.exe,light.exe -File -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $tool) { throw "No se encontro WiX en el runner" }
          $tool.Directory.FullName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package EXE
        shell: pwsh
        run: |
          jpackage --type exe --name DemoApp --app-version 1.0.0 --dest dist --module-path "target/demo-1.0-SNAPSHOT.jar;target/libs" --module com.example.demo/com.example.demo.Launcher --win-shortcut --win-menu

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DemoApp-windows-installer
          path: dist/*.exe